<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NINI Menu 2026 線上點餐</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",Arial;background:#f6f7fb;margin:0;padding:20px}
    .wrap{max-width:1100px;margin:0 auto;background:#fff;padding:18px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.06)}
    h1{margin:0 0 8px;font-size:22px}
    .item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed #f0f0f0}
    .meta{max-width:68%}
    .name{font-weight:700}
    .desc{color:#666;font-size:13px;margin-top:4px}
    .controls{display:flex;align-items:center;gap:10px}
    .price{min-width:110px;text-align:right;font-weight:800}
    .qty{display:flex;align-items:center;gap:6px}
    button{background:#0078d4;color:#fff;border:0;padding:6px 10px;border-radius:6px;cursor:pointer}
    button.ghost{background:#efefef;color:#333}
    input[type="number"]{width:64px;padding:6px;border-radius:6px;border:1px solid #ddd;text-align:center}
    input[type="text"]{padding:8px;border-radius:6px;border:1px solid #ddd;width:220px}
    .summary{margin-top:16px;padding:12px;background:#fafafa;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
    .total{font-size:18px;font-weight:800}
    .checkout{background:#28a745;padding:10px 14px;border-radius:8px;color:#fff;font-weight:700;border:0;cursor:pointer}
    .note{font-size:13px;color:#666}
    .success{color:#0b7a3f;font-weight:700}
    .error{color:#b02a37;font-weight:700}
    .form-row{display:flex;gap:12px;align-items:center;margin-top:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NINI Menu 2026 線上點餐</h1>
    <p class="note">請輸入代號並選擇餐點數量，按送出後系統會寫入 Google 試算表。</p>

    <form id="orderForm" onsubmit="event.preventDefault(); submitOrder();">
      <!-- 範例餐點 -->
      <div class="item" data-id="SAL01" data-price="290">
        <div class="meta">
          <div class="name">SAL01 凱撒沙拉</div>
          <div class="desc">帕瑪森起司、香烤麵包丁、培根、蘿美生菜</div>
        </div>
        <div class="controls">
          <div class="price">NT$290</div>
          <div class="qty">
            <button type="button" class="ghost" onclick="changeQty('SAL01', -1)">-</button>
            <input type="number" id="qty_SAL01" value="0" min="0" onchange="recalc()">
            <button type="button" onclick="changeQty('SAL01', 1)">+</button>
          </div>
        </div>
      </div>

      <!-- 代號輸入 -->
      <div class="form-row">
        <label for="orderCodeInput"><strong>輸入代號</strong></label>
        <input type="text" id="orderCodeInput" placeholder="例如 666 或 666#" autocomplete="off">
      </div>

      <div class="summary">
        <div>
          <div><strong>已選餐點 :</strong> <span id="selectedCount">0</span></div>
        </div>
        <div style="text-align:right">
          <div class="total">總金額: NT$<span id="totalPrice">0</span></div>
          <div style="margin-top:8px">
            <button type="submit" class="checkout">送出訂單</button>
          </div>
        </div>
      </div>
    </form>

    <div id="result" style="margin-top:12px"></div>
  </div>

  <script>
    // 使用你提供的 Web App URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwUDkTnuXLqtcCRL0Sd8PX84ypAeMJQQ5PQsPpyi06RUOIcF1v3l_YQtyJ4DCVxVHnb4w/exec";
    const SHEET_ID = "1DgEfKOK7FbA3r4_wCwDAtetOoR6l9nIU9eyHSP5UkKY";

    function changeQty(code, delta) {
      const input = document.getElementById('qty_' + code);
      if (!input) return;
      let v = Number(input.value) + delta;
      if (v < 0) v = 0;
      input.value = v;
      recalc();
    }

    function recalc() {
      const items = document.querySelectorAll('[data-id]');
      let total = 0, count = 0;
      items.forEach(item => {
        const id = item.getAttribute('data-id');
        const qtyInput = document.getElementById('qty_' + id);
        if (!qtyInput) return;
        const qty = Number(qtyInput.value) || 0;
        if (qty <= 0) return;
        let price = Number(item.getAttribute('data-price')) || 0;
        total += price * qty;
        count += qty;
      });
      document.getElementById('totalPrice').textContent = total;
      document.getElementById('selectedCount').textContent = count;
    }

    function validateUserCode(code) {
      if (!code) return { ok:false, msg:'代號為必填。'};
      const t = code.trim();
      if (/^\d+#$/.test(t)) return { ok:true, value:t };
      if (/^\d+$/.test(t)) return { ok:true, value:t + '#' };
      return { ok:false, msg:'代號格式錯誤，請輸入數字或數字加 #' };
    }

    async function submitOrder() {
      const userCodeInput = document.getElementById('orderCodeInput');
      const codeValidation = validateUserCode(userCodeInput.value);
      if (!codeValidation.ok) { showResult(codeValidation.msg, 'error'); userCodeInput.focus(); return; }
      const userCode = codeValidation.value;

      const items = document.querySelectorAll('[data-id]');
      const orderItems = [];
      let total = 0;
      items.forEach(item => {
        const id = item.getAttribute('data-id');
        const qtyInput = document.getElementById('qty_' + id);
        if (!qtyInput) return;
        const qty = Number(qtyInput.value) || 0;
        if (qty <= 0) return;
        const name = (item.querySelector('.name') || {}).textContent || id;
        const price = Number(item.getAttribute('data-price')) || 0;
        orderItems.push({ code:id, name:name.trim(), qty:qty, unit_price:price, line_total:price*qty });
        total += price * qty;
      });

      if (orderItems.length === 0) { showResult('請先選擇至少一項餐點。','error'); return; }

      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      const datePart = now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate());
      const timePart = pad(now.getHours()) + pad(now.getMinutes());
      const rand = Math.floor(Math.random()*9000)+1000;
      const systemOrderCode = 'NINI-' + datePart + '-' + timePart + '-' + rand;

      const payload = {
        systemOrderCode: systemOrderCode,
        userCode: userCode,
        createdAt: now.toISOString(),
        items: orderItems
